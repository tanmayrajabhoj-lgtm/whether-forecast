<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkyPulse — Weather Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #060b18;
  --bg2:       #0d1525;
  --bg3:       #111d33;
  --card:      rgba(15,25,50,0.85);
  --card-hover:rgba(20,34,65,0.95);
  --glass:     rgba(255,255,255,0.04);
  --glass2:    rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);

  --indigo:    #6366f1;
  --indigo2:   #818cf8;
  --indigo3:   #a5b4fc;
  --cyan:      #22d3ee;
  --cyan2:     #67e8f9;
  --teal:      #2dd4bf;
  --amber:     #fbbf24;
  --rose:      #fb7185;
  --violet:    #a78bfa;

  --text:      #f0f4ff;
  --text2:     #8b9cc8;
  --text3:     #4a5882;

  --radius:    12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --shadow:    0 24px 64px rgba(0,0,0,0.6);
  --shadow-sm: 0 4px 20px rgba(0,0,0,0.4);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Animated Aurora Background ───────────────────────────── */
.aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  animation: drift 18s ease-in-out infinite;
}
.aurora-blob:nth-child(1) {
  width: 600px; height: 600px;
  background: radial-gradient(circle, #6366f1, transparent);
  top: -200px; left: -150px;
  animation-delay: 0s;
}
.aurora-blob:nth-child(2) {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #22d3ee, transparent);
  top: 20%; right: -100px;
  animation-delay: -6s;
}
.aurora-blob:nth-child(3) {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #a78bfa, transparent);
  bottom: -100px; left: 30%;
  animation-delay: -12s;
}
@keyframes drift {
  0%, 100% { transform: translate(0,0) scale(1); }
  33%       { transform: translate(40px,-40px) scale(1.05); }
  66%       { transform: translate(-30px,30px) scale(0.96); }
}

/* ─── Layout ────────────────────────────────────────────────── */
.wrapper {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 2rem 1.25rem 3rem;
}

/* ─── Keyframes ─────────────────────────────────────────────── */
@keyframes fadeUp   { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
@keyframes spin     { to{transform:rotate(360deg)} }
@keyframes shimmer  { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
@keyframes popIn    { 0%{opacity:0;transform:scale(.88)} 70%{transform:scale(1.03)} 100%{opacity:1;transform:scale(1)} }
@keyframes slideIn  { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.45} }
@keyframes heartbeat{ 0%,100%{transform:scale(1)} 14%{transform:scale(1.12)} 28%{transform:scale(1)} }

/* ─── Header ────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 2rem;
  animation: fadeUp .5s ease both;
}
.brand { display: flex; align-items: center; gap: 13px; }
.brand-icon {
  width: 46px; height: 46px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--indigo), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 28px rgba(99,102,241,.5);
  animation: float 4s ease-in-out infinite, heartbeat 8s ease-in-out infinite;
  flex-shrink: 0;
}
.brand-text h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.4px;
  background: linear-gradient(90deg, #f0f4ff, var(--indigo3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-text p { font-size: 12px; color: var(--text3); margin-top: 2px; }

.live-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(34,211,238,.08);
  border: 1px solid rgba(34,211,238,.22);
  color: var(--cyan2);
  font-size: 12px; font-weight: 500;
  padding: 6px 14px;
  border-radius: 30px;
  letter-spacing: .3px;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: pulse 2s ease-in-out infinite;
}

/* ─── Search Card ───────────────────────────────────────────── */
.search-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius-xl);
  padding: 1.4rem 1.5rem;
  margin-bottom: 1.25rem;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow-sm);
  animation: fadeUp .5s .06s ease both;
}
.search-row { display: flex; gap: 10px; margin-bottom: 12px; }

.input-wrap { flex: 1; position: relative; }
.input-wrap .i-icon {
  position: absolute;
  left: 13px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 18px;
  pointer-events: none;
  transition: color .2s;
}
.input-wrap:focus-within .i-icon { color: var(--indigo2); }

input[type=text] {
  width: 100%; height: 46px;
  padding: 0 14px 0 42px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
input[type=text]:focus {
  border-color: rgba(99,102,241,.6);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 0 3px rgba(99,102,241,.15);
}
input[type=text]::placeholder { color: var(--text3); }

.btn-search {
  height: 46px;
  padding: 0 22px;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--indigo), #4338ca);
  color: #fff;
  font-size: 14px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: transform .15s, box-shadow .2s, filter .2s;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(99,102,241,.35);
}
.btn-search:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.5); filter: brightness(1.08); }
.btn-search:active { transform: scale(.97); }

.bottom-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.unit-label { font-size: 12px; color: var(--text3); }
.unit-pills {
  display: flex;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  gap: 3px;
}
.unit-btn {
  height: 30px; padding: 0 16px;
  border: none; border-radius: 7px;
  background: transparent;
  color: var(--text2);
  font-size: 13px; font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all .2s;
}
.unit-btn.active {
  background: var(--indigo);
  color: #fff;
  box-shadow: 0 2px 10px rgba(99,102,241,.4);
}
.unit-row { display: flex; align-items: center; gap: 8px; }

.quick-cities { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.quick-label  { font-size: 11px; color: var(--text3); }
.quick-btn {
  font-size: 11px; padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .2s;
}
.quick-btn:hover { border-color: var(--indigo2); color: var(--indigo3); background: rgba(99,102,241,.08); }

/* ─── Error / Loading ───────────────────────────────────────── */
.error-box {
  display: none;
  background: rgba(251,113,133,.08);
  border: 1px solid rgba(251,113,133,.25);
  color: #fda4af;
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 13px;
  margin-bottom: 1.25rem;
  animation: fadeUp .3s ease;
  display: flex; align-items: center; gap: 8px;
}
.error-box i { font-size: 16px; flex-shrink: 0; }

.loading-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 0;
  gap: 16px;
  animation: fadeIn .3s ease;
}
.loader-ring {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 3px solid rgba(99,102,241,.15);
  border-top-color: var(--indigo);
  animation: spin .75s linear infinite;
}
.loading-text { font-size: 14px; color: var(--text2); }

/* ─── Current Card ──────────────────────────────────────────── */
.current-card {
  display: none;
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
  animation: popIn .5s ease both;
  border: 1px solid var(--border2);
}

.card-hero {
  position: relative;
  padding: 2rem;
  background: linear-gradient(135deg, rgba(99,102,241,.22) 0%, rgba(34,211,238,.1) 60%, rgba(15,25,50,.85) 100%);
  overflow: hidden;
}
.card-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236366f1' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}

.hero-grid { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; position: relative; }

.hero-left {}
.location-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 26px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  letter-spacing: -.3px;
}
.location-name i { color: var(--rose); font-size: 20px; }
.location-date { font-size: 13px; color: var(--text2); margin-top: 4px; }
.condition-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px;
  font-size: 15px; color: var(--text2);
  text-transform: capitalize;
}
.cond-emoji {
  font-size: 30px;
  animation: float 3s ease-in-out infinite;
  display: inline-block;
}

.hero-right { text-align: right; }
.temp-big {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 72px; font-weight: 700; line-height: 1;
  background: linear-gradient(135deg, #fff 30%, var(--indigo3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: popIn .5s .1s ease both;
  letter-spacing: -3px;
}
.feels-like { font-size: 13px; color: var(--text2); margin-top: 6px; }

/* Hi / Lo row */
.hi-lo {
  display: flex; gap: 14px;
  margin-top: 16px;
}
.hi-lo-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px;
}
.hi-lo-item i { font-size: 14px; }
.hi-val  { color: #fb923c; font-weight: 600; }
.lo-val  { color: var(--cyan2); font-weight: 600; }

/* ─── Stats Grid ────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--bg3);
}
.stat-cell {
  background: var(--card);
  padding: 16px 18px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background .2s;
  cursor: default;
}
.stat-cell:hover { background: var(--card-hover); }
.stat-cell:nth-child(3n) { border-right: none; }
.stat-cell:nth-child(4), .stat-cell:nth-child(5), .stat-cell:nth-child(6) { border-bottom: none; }

.stat-label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: .7px; color: var(--text3);
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 8px; font-weight: 500;
}
.stat-label i { font-size: 15px; }
.stat-val { font-size: 20px; font-weight: 600; color: var(--text); font-family: 'Space Grotesk', sans-serif; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

.bar-track { height: 3px; background: rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; margin-top:8px; }
.bar-fill  { height:100%; border-radius:2px; width:0; transition: width 1s ease .4s; }
.bar-hum   { background: linear-gradient(90deg, var(--cyan), var(--indigo)); }
.bar-uv    { background: linear-gradient(90deg, var(--amber), var(--rose)); }

.ic-hum  { color: var(--cyan2); }
.ic-wind { color: var(--teal); }
.ic-vis  { color: var(--violet); }
.ic-pres { color: var(--amber); }
.ic-rise { color: #fbbf24; }
.ic-set  { color: #f97316; }

/* ─── Forecast Section ──────────────────────────────────────── */
.section {
  display: none;
  animation: fadeUp .5s .1s ease both;
  margin-bottom: 1.25rem;
}
.section-title {
  font-size: 13px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .7px;
  color: var(--text3);
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 12px;
}
.section-title i { color: var(--indigo2); font-size: 16px; }

.forecast-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.fc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 8px;
  text-align: center;
  cursor: default;
  transition: transform .2s, border-color .2s, background .2s, box-shadow .2s;
  backdrop-filter: blur(10px);
}
.fc-card:hover {
  transform: translateY(-5px);
  background: var(--card-hover);
  border-color: rgba(99,102,241,.4);
  box-shadow: 0 12px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(99,102,241,.15);
}
.fc-day  { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.fc-date { font-size: 10px; color: var(--text3); margin-bottom: 8px; }
.fc-emoji { font-size: 28px; display: block; margin: 6px 0; animation: float 3.5s ease-in-out infinite; }
.fc-temp { font-size: 18px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: var(--text); }
.fc-desc { font-size: 10px; color: var(--text2); margin-top: 4px; text-transform: capitalize; line-height: 1.4; }
.fc-hum  { font-size: 10px; color: var(--text3); margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 3px; }
.fc-hum i { font-size: 11px; color: var(--cyan2); }

/* ─── Hourly Forecast ───────────────────────────────────────── */
.hourly-scroll {
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
  padding-bottom: 4px;
}
.hourly-scroll::-webkit-scrollbar { height: 4px; }
.hourly-scroll::-webkit-scrollbar-track { background: transparent; }
.hourly-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.hourly-row {
  display: flex;
  gap: 8px;
  min-width: max-content;
}
.h-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  text-align: center;
  min-width: 70px;
  transition: transform .2s, background .2s, border-color .2s;
  cursor: default;
}
.h-card:hover { transform: translateY(-3px); background: var(--card-hover); border-color: rgba(99,102,241,.35); }
.h-time  { font-size: 11px; color: var(--text3); font-weight: 600; margin-bottom: 4px; }
.h-emoji { font-size: 20px; display: block; margin: 4px 0; }
.h-temp  { font-size: 14px; font-weight: 600; font-family: 'Space Grotesk', sans-serif; }
.h-hum   { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* ─── Air Quality / UV / Extras ─────────────────────────────── */
.extras-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.extra-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  transition: background .2s;
}
.extra-card:hover { background: var(--card-hover); }
.extra-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.extra-label i { font-size: 15px; }
.extra-val { font-size: 24px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
.extra-desc { font-size: 12px; color: var(--text2); margin-top: 4px; }
.extra-bar { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; margin-top: 10px; }
.extra-bar-fill { height: 100%; border-radius: 3px; width: 0; transition: width 1.2s ease .5s; }

/* ─── Footer ────────────────────────────────────────────────── */
footer {
  margin-top: 2rem;
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  animation: fadeUp .6s .3s ease both;
}
footer a { color: var(--text2); text-decoration: none; }
footer a:hover { color: var(--indigo3); }
.footer-divider {
  width: 40px; height: 1px;
  background: var(--border2);
  margin: 12px auto;
}

/* ─── Responsive ────────────────────────────────────────────── */
@media(max-width:580px){
  .forecast-grid { grid-template-columns: repeat(3,1fr); }
  .stats-grid    { grid-template-columns: repeat(2,1fr); }
  .stat-cell:nth-child(3n)  { border-right: 1px solid var(--border); }
  .stat-cell:nth-child(2n)  { border-right: none; }
  .stat-cell:nth-child(5),
  .stat-cell:nth-child(6)   { border-bottom: none; }
  .stat-cell:nth-child(3)   { border-bottom: 1px solid var(--border); }
  .temp-big  { font-size: 56px; }
  .card-hero { padding: 1.4rem; }
  .extras-grid { grid-template-columns: 1fr; }
}
@media(max-width:400px){
  .forecast-grid { grid-template-columns: repeat(2,1fr); }
  .search-row    { flex-direction: column; }
  .btn-search    { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-icon">⛅</div>
      <div class="brand-text">
        <h1>SkyPulse</h1>
        <p>Real-time weather &amp; 5-day forecast</p>
      </div>
    </div>
    <div class="live-pill"><div class="live-dot"></div> Live Data</div>
  </header>

  <!-- Search -->
  <div class="search-card">
    <div class="search-row">
      <div class="input-wrap">
        <i class="ti ti-search i-icon" aria-hidden="true"></i>
        <input type="text" id="city-input"
               placeholder="Search city — London, Tokyo, Mumbai…"
               onkeydown="if(event.key==='Enter') search()"
               autofocus autocomplete="off" />
      </div>
      <button class="btn-search" onclick="search()">
        <i class="ti ti-search" aria-hidden="true"></i> Search
      </button>
    </div>
    <div class="bottom-row">
      <div class="unit-row">
        <span class="unit-label">Units:</span>
        <div class="unit-pills">
          <button class="unit-btn active" id="btn-c" onclick="setUnit('metric')">°C</button>
          <button class="unit-btn"        id="btn-f" onclick="setUnit('imperial')">°F</button>
        </div>
      </div>
      <div class="quick-cities">
        <span class="quick-label">Quick:</span>
        <button class="quick-btn" onclick="quickSearch('New York')">New York</button>
        <button class="quick-btn" onclick="quickSearch('London')">London</button>
        <button class="quick-btn" onclick="quickSearch('Tokyo')">Tokyo</button>
        <button class="quick-btn" onclick="quickSearch('Sydney')">Sydney</button>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box" style="display:none">
    <i class="ti ti-alert-circle"></i>
    <span id="error-text">Error</span>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" id="loading-wrap">
    <div class="loader-ring"></div>
    <div class="loading-text">Fetching weather data…</div>
  </div>

  <!-- Current Weather Card -->
  <div class="current-card" id="current-card">
    <div class="card-hero">
      <div class="hero-grid">
        <div class="hero-left">
          <div class="location-name"><i class="ti ti-map-pin"></i><span id="loc-name"></span></div>
          <div class="location-date" id="loc-date"></div>
          <div class="condition-row">
            <span class="cond-emoji" id="cond-emoji"></span>
            <span id="cond-text"></span>
          </div>
          <div class="hi-lo" id="hi-lo-row">
            <div class="hi-lo-item"><i class="ti ti-arrow-up" style="color:#fb923c"></i><span class="hi-val" id="temp-hi"></span></div>
            <div class="hi-lo-item"><i class="ti ti-arrow-down" style="color:var(--cyan2)"></i><span class="lo-val" id="temp-lo"></span></div>
          </div>
        </div>
        <div class="hero-right">
          <div class="temp-big" id="temp-main"></div>
          <div class="feels-like" id="feels-like"></div>
        </div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-cell" style="animation:slideIn .4s .05s ease both">
        <div class="stat-label"><i class="ti ti-droplet ic-hum"></i> Humidity</div>
        <div class="stat-val" id="s-hum"></div>
        <div class="bar-track"><div class="bar-fill bar-hum" id="hum-fill"></div></div>
      </div>
      <div class="stat-cell" style="animation:slideIn .4s .1s ease both">
        <div class="stat-label"><i class="ti ti-wind ic-wind"></i> Wind</div>
        <div class="stat-val" id="s-wind"></div>
        <div class="stat-sub" id="s-wind-dir"></div>
      </div>
      <div class="stat-cell" style="animation:slideIn .4s .15s ease both">
        <div class="stat-label"><i class="ti ti-eye ic-vis"></i> Visibility</div>
        <div class="stat-val" id="s-vis"></div>
      </div>
      <div class="stat-cell" style="animation:slideIn .4s .2s ease both">
        <div class="stat-label"><i class="ti ti-gauge ic-pres"></i> Pressure</div>
        <div class="stat-val" id="s-pres"></div>
        <div class="stat-sub" id="s-pres-sub"></div>
      </div>
      <div class="stat-cell" style="animation:slideIn .4s .25s ease both">
        <div class="stat-label"><i class="ti ti-sunrise ic-rise"></i> Sunrise</div>
        <div class="stat-val" id="s-rise"></div>
      </div>
      <div class="stat-cell" style="animation:slideIn .4s .3s ease both">
        <div class="stat-label"><i class="ti ti-sunset ic-set"></i> Sunset</div>
        <div class="stat-val" id="s-set"></div>
      </div>
    </div>
  </div>

  <!-- Hourly -->
  <div class="section" id="hourly-section">
    <div class="section-title"><i class="ti ti-clock"></i> Next 24 hours</div>
    <div class="hourly-scroll">
      <div class="hourly-row" id="hourly-row"></div>
    </div>
  </div>

  <!-- 5-day Forecast -->
  <div class="section" id="forecast-section">
    <div class="section-title"><i class="ti ti-calendar-event"></i> 5-day forecast</div>
    <div class="forecast-grid" id="forecast-grid"></div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-divider"></div>
    Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a>
    &nbsp;·&nbsp; Data refreshes on each search
  </footer>

</div>

<script>
const BASE    = 'https://api.openweathermap.org/data/2.5';
const API_KEY = '398a429c6c8dbc643b5ff3ec42df3da4';
let   unit    = 'metric';
let   lastCity = '';

/* ── Unit toggle ─────────────────────────────────── */
function setUnit(u) {
  unit = u;
  document.getElementById('btn-c').classList.toggle('active', u === 'metric');
  document.getElementById('btn-f').classList.toggle('active', u === 'imperial');
  if (lastCity) doSearch(lastCity);
}

/* ── Quick search ────────────────────────────────── */
function quickSearch(city) {
  document.getElementById('city-input').value = city;
  doSearch(city);
}

/* ── Error helpers ───────────────────────────────── */
function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-text').textContent = msg;
  box.style.display = 'flex';
}
function hideError() { document.getElementById('error-box').style.display = 'none'; }

/* ── Condition helpers ───────────────────────────── */
function condEmoji(main) {
  const m = (main || '').toLowerCase();
  if (m.includes('thunder'))                           return '⛈️';
  if (m.includes('drizzle'))                           return '🌦️';
  if (m.includes('rain'))                              return '🌧️';
  if (m.includes('snow'))                              return '❄️';
  if (m.includes('mist') || m.includes('fog') ||
      m.includes('haze') || m.includes('smoke'))       return '🌫️';
  if (m.includes('tornado'))                           return '🌪️';
  if (m.includes('squall'))                            return '💨';
  if (m.includes('cloud'))                             return '☁️';
  if (m.includes('clear'))                             return '☀️';
  return '🌡️';
}

function fmtTime(ts, tz) {
  return new Date((ts + (tz || 0)) * 1000)
    .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' });
}
function tempU()  { return unit === 'metric' ? '°C' : '°F'; }
function windU()  { return unit === 'metric' ? 'm/s' : 'mph'; }

function degToDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

/* ── Search entry ────────────────────────────────── */
function search() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) { showError('Please enter a city name.'); return; }
  doSearch(city);
}

/* ── Main fetch ──────────────────────────────────── */
async function doSearch(city) {
  hideError();
  lastCity = city;

  setLoading(true);
  hide('current-card');
  hide('forecast-section');
  hide('hourly-section');

  try {
    const [curRes, fcRes] = await Promise.all([
      fetch(`${BASE}/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=${unit}`),
      fetch(`${BASE}/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=${unit}&cnt=40`)
    ]);

    if (curRes.status === 401) throw new Error('Invalid API key. Please check your key.');
    if (curRes.status === 404) throw new Error(`City "${city}" not found. Try another name.`);
    if (!curRes.ok)            throw new Error(`Error ${curRes.status}. Please try again.`);

    const cur = await curRes.json();
    const fc  = fcRes.ok ? await fcRes.json() : null;

    renderCurrent(cur);
    if (fc) {
      renderHourly(fc, cur.timezone);
      renderForecast(fc);
    }
  } catch (e) {
    showError(e.message || 'Network error. Please check your connection.');
  } finally {
    setLoading(false);
  }
}

/* ── Loading state ───────────────────────────────── */
function setLoading(on) {
  document.getElementById('loading-wrap').style.display = on ? 'flex' : 'none';
}
function hide(id) { document.getElementById(id).style.display = 'none'; }
function show(id, display = 'block') {
  const el = document.getElementById(id);
  el.style.display = display;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = '';
}

/* ── Render current ──────────────────────────────── */
function renderCurrent(d) {
  const tz = d.timezone;
  set('loc-name',   `${d.name}, ${d.sys.country}`);
  set('loc-date',   new Date().toLocaleDateString([], { weekday:'long', year:'numeric', month:'long', day:'numeric' }));
  set('temp-main',  `${Math.round(d.main.temp)}${tempU()}`);
  set('feels-like', `Feels like ${Math.round(d.main.feels_like)}${tempU()} · ${d.weather[0].description}`);
  set('cond-emoji', condEmoji(d.weather[0].main));
  set('cond-text',  d.weather[0].description);
  set('temp-hi',    `H: ${Math.round(d.main.temp_max)}${tempU()}`);
  set('temp-lo',    `L: ${Math.round(d.main.temp_min)}${tempU()}`);

  set('s-hum',  `${d.main.humidity}%`);
  document.getElementById('hum-fill').style.width = d.main.humidity + '%';

  const wspd = d.wind.speed.toFixed(1);
  const wdir = d.wind.deg ? degToDir(d.wind.deg) : '';
  set('s-wind',     `${wspd} ${windU()}`);
  set('s-wind-dir', wdir ? `Direction: ${wdir} (${d.wind.deg}°)` : '');

  set('s-vis',  d.visibility ? `${(d.visibility / 1000).toFixed(1)} km` : 'N/A');
  set('s-pres', `${d.main.pressure} hPa`);
  set('s-pres-sub', pressureDesc(d.main.pressure));
  set('s-rise', fmtTime(d.sys.sunrise, tz));
  set('s-set',  fmtTime(d.sys.sunset,  tz));

  show('current-card');
}

function pressureDesc(p) {
  if (p < 1000) return 'Low — stormy likely';
  if (p < 1013) return 'Normal';
  if (p < 1020) return 'High — fair weather';
  return 'Very high — dry & clear';
}

/* ── Render hourly ───────────────────────────────── */
function renderHourly(data, tz) {
  const items = data.list.slice(0, 8); // next 24h (3h intervals)
  document.getElementById('hourly-row').innerHTML = items.map((item, i) => {
    const t = new Date((item.dt + (tz || 0)) * 1000);
    const hr = t.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'UTC' });
    return `<div class="h-card" style="animation:fadeUp .4s ${i * .05}s ease both">
      <div class="h-time">${i === 0 ? 'Now' : hr}</div>
      <span class="h-emoji">${condEmoji(item.weather[0].main)}</span>
      <div class="h-temp">${Math.round(item.main.temp)}${tempU()}</div>
      <div class="h-hum"><i class="ti ti-droplet" style="color:var(--cyan2)"></i>${item.main.humidity}%</div>
    </div>`;
  }).join('');
  show('hourly-section');
}

/* ── Render forecast ─────────────────────────────── */
function renderForecast(data) {
  const daily = {};
  for (const item of data.list) {
    const date = item.dt_txt.split(' ')[0];
    const time = item.dt_txt.split(' ')[1];
    if (!daily[date] || time === '12:00:00') daily[date] = item;
  }
  const days = Object.entries(daily).slice(0, 5);
  document.getElementById('forecast-grid').innerHTML = days.map(([date, item], i) => {
    const d = new Date(date + 'T12:00:00');
    const dayName = d.toLocaleDateString([], { weekday: 'short' });
    const dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    return `<div class="fc-card" style="animation:fadeUp .4s ${i * .08}s ease both">
      <div class="fc-day">${dayName}</div>
      <div class="fc-date">${dateStr}</div>
      <span class="fc-emoji">${condEmoji(item.weather[0].main)}</span>
      <div class="fc-temp">${Math.round(item.main.temp)}${tempU()}</div>
      <div class="fc-desc">${item.weather[0].description}</div>
      <div class="fc-hum"><i class="ti ti-droplet"></i>${item.main.humidity}%</div>
    </div>`;
  }).join('');
  show('forecast-section');
}

/* ── Tiny helpers ────────────────────────────────── */
function set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}
</script>
</body>
</html>
